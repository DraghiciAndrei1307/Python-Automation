name: Publish 'pg_provisioner' Package (PyPI & GitHub)
on: workflow_dispatch
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install setuptools wheel twine build
          pip install -r requirements.txt
      - name: Create GitHub Release for 'pg_provisioner' package
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pg_provisioner/dist/*.whl
            pg_provisioner/dist/*.tar.gz
          tag_name: v0.0.1
          name: Release of 'pg_provisioner' v0.0.1
          body: "The official release of the pg_provisioner_draghici_andrei package."
