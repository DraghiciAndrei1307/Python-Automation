name: Publish 'os_executor' Package (PyPI & GitHub)
on: workflow_dispatch
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install setuptools wheel twine build
          pip install -r requirements.txt
      - name: Build and Publish 'os_executor' package to PyPi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd os_executor
          python -m build
          twine upload dist/* --verbose
      - name: Create GitHub Release for 'os_executor' package
        uses: softprops/action-gh-release@v2
        with:
          files: |
            os_executor/dist/*.whl
            os_executor/dist/*.tar.gz
          tag_name: v0.2.1
          name: Release v0.2.1
          body: "The official release of the os_executor_draghici_andrei package"
